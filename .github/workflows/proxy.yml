name: Proxy HA Image (gzip)

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull, retag, and push with gzip
        run: |
          docker pull homeassistant/home-assistant:latest
          docker tag homeassistant/home-assistant:latest benhdavis/home-assistant:latest
          docker push benhdavis/home-assistant:latest
